<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CodeVerse — Minimal Learning Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FBFBFB;
      color: #1A1A1A;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #E8E8E8;
    }
    ::-webkit-scrollbar-thumb {
      background: #AAA;
      border-radius: 10px;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(251,251,251,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #EDEDED;
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
      cursor: pointer;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      background: #111;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }
    .search-container {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 8px 16px 8px 38px;
      background: white;
      border: 1px solid #E5E5E5;
      border-radius: 40px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .search-input:focus {
      outline: none;
      border-color: #AAA;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8C8C8C;
      font-size: 1rem;
    }
    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #EFEFEF;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      overflow: hidden;
      display: none;
      z-index: 200;
    }
    .search-results.show {
      display: block;
    }
    .search-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .search-item:hover {
      background: #F7F7F7;
    }
    .search-item i {
      width: 24px;
      font-size: 1.1rem;
      color: #5A5A6E;
    }
    .search-item-tag {
      margin-left: auto;
      font-size: 0.7rem;
      font-family: monospace;
      background: #F0F0F0;
      padding: 2px 8px;
      border-radius: 30px;
      color: #666;
    }
    .cmd-k {
      font-size: 0.75rem;
      font-family: monospace;
      color: #999;
      background: #F5F5F5;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #E8E8E8;
    }
    .menu-btn {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
    }
    .menu-btn span {
      width: 20px;
      height: 2px;
      background: #1A1A1A;
      border-radius: 2px;
      transition: 0.2s;
    }

    .sidebar {
      position: fixed;
      top: 64px;
      left: 0;
      bottom: 0;
      width: 260px;
      background: white;
      border-right: 1px solid #EFEFEF;
      overflow-y: auto;
      padding: 32px 16px;
      z-index: 90;
      transition: transform 0.25s ease;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      color: #3A3A3A;
      cursor: pointer;
      transition: all 0.15s;
      margin: 2px 0;
    }
    .sidebar-item:hover {
      background: #F5F5F5;
      color: #000;
    }
    .sidebar-item.active {
      background: #111;
      color: white;
    }
    .sidebar-item i {
      width: 28px;
      font-size: 1.2rem;
    }
    .sidebar-item.active i {
      color: white;
    }

    .main {
      margin-left: 260px;
      padding-top: 64px;
      min-height: 100vh;
    }
    .view {
      display: none;
      animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .view.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      padding: 48px 48px 32px;
      border-bottom: 1px solid #F0F0F0;
    }
    .hero-title {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .hero-desc {
      font-size: 1rem;
      color: #5A5A5A;
      max-width: 520px;
      margin-bottom: 32px;
    }
    .hero-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 48px;
    }
    .btn-primary {
      background: #111;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #2C2C2C;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #E0E0E0;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-secondary:hover {
      border-color: #AAA;
      background: #FCFCFC;
    }
    .stats {
      display: flex;
      gap: 48px;
      padding-top: 32px;
      border-top: 1px solid #F0F0F0;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #8C8C8C;
      margin-top: 4px;
    }

    .section {
      padding: 48px;
      border-bottom: 1px solid #F0F0F0;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border: 1px solid #EFEFEF;
      border-radius: 20px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #DDD;
      box-shadow: 0 6px 12px rgba(0,0,0,0.02);
    }
    .card-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 0.75rem;
      color: #8C8C8C;
    }

    .topic-layout {
      display: flex;
    }
    .topic-sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      padding: 32px 16px;
      border-right: 1px solid #F0F0F0;
    }
    .topic-header {
      padding-bottom: 20px;
      border-bottom: 1px solid #EFEFEF;
      margin-bottom: 20px;
    }
    .topic-header i {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .topic-name {
      font-weight: 600;
      font-size: 1.2rem;
    }
    .progress-bar {
      margin-top: 16px;
      height: 3px;
      background: #F0F0F0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #111;
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 0.7rem;
      font-family: monospace;
      color: #8C8C8C;
      margin-top: 6px;
    }
    .topic-nav-item {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      margin: 2px 0;
      transition: background 0.15s;
    }
    .topic-nav-item:hover {
      background: #F5F5F5;
    }
    .topic-nav-item.active {
      background: #111;
      color: white;
    }
    .topic-content {
      flex: 1;
      max-width: 780px;
      padding: 48px 48px 80px;
      margin: 0 auto;
    }
    .breadcrumb {
      font-size: 0.75rem;
      font-family: monospace;
      color: #8C8C8C;
      margin-bottom: 24px;
    }
    .breadcrumb span {
      cursor: pointer;
    }
    .article-header {
      margin-bottom: 40px;
    }
    .article-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8C8C8C;
      margin-bottom: 12px;
    }
    .article-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .article-meta {
      display: flex;
      gap: 20px;
      font-size: 0.75rem;
      font-family: monospace;
      color: #8C8C8C;
    }
    .article-meta i {
      margin-right: 4px;
    }
    .divider {
      height: 1px;
      background: #F0F0F0;
      margin: 28px 0;
    }
    .article-body {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2A2A2A;
    }
    .code-block {
      margin: 28px 0;
      border-radius: 16px;
      overflow: hidden;
      background: #1E1E1E;
      border: 1px solid #2A2A2A;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #2C2C2C;
      font-size: 0.7rem;
      font-family: monospace;
      color: #AAA;
    }
    .code-lang {
      text-transform: uppercase;
    }
    .copy-btn {
      background: #3C3C3C;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      color: #CCC;
      font-family: monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .copy-btn:hover {
      background: #4C4C4C;
      color: white;
    }
    pre {
      margin: 0;
      padding: 20px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #E0E0E0;
      background: #1E1E1E;
    }
    .code-output {
      background: #141414;
      border-top: 1px solid #2A2A2A;
      padding: 12px 20px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #8BC34A;
    }
    .footer-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid #F0F0F0;
    }
    .nav-btn {
      padding: 8px 20px;
      border: 1px solid #E0E0E0;
      border-radius: 40px;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-btn.next {
      background: #111;
      color: white;
      border-color: #111;
    }
    .nav-btn:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 20px rgba(0,0,0,0.02);
      }
      .main {
        margin-left: 0;
      }
      .menu-btn {
        display: flex;
      }
      .hero {
        padding: 32px 24px;
      }
      .section {
        padding: 32px 24px;
      }
      .topic-content {
        padding: 32px 24px;
      }
      .topic-sidebar {
        display: none;
      }
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
<header class="header">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
  <div class="logo" onclick="goHome()"><div class="logo-mark">&lt;/&gt;</div><span>CodeVerse</span></div>
  <div class="search-container">
    <span class="search-icon"><i class="fas fa-search"></i></span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search languages, topics..." oninput="handleSearch(this.value)" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="cmd-k"><i class="far fa-keyboard"></i> ⌘K</div>
</header>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-item active" onclick="goHome(); setActiveSidebar(this)"><i class="fas fa-home"></i><span>Home</span></div>
  <div id="sidebarLanguages"></div>
</aside>
<main class="main">
  <div class="view active" id="homeView">
    <div class="hero">
      <h1 class="hero-title">Learn to code,<br>every detail explained.</h1>
      <p class="hero-desc">Complete tutorials with real code examples, annotated line by line. All content loaded from a single JSON file.</p>
      <div class="hero-buttons">
        <button class="btn-primary" id="startPython"><i class="fab fa-python"></i> Start with Python →</button>
        <button class="btn-secondary" id="exploreDsa"><i class="fas fa-chart-line"></i> Explore</button>
      </div>
      <div class="stats">
        <div><div class="stat-number" id="langCount">0</div><div class="stat-label">Languages</div></div>
        <div><div class="stat-number">200+</div><div class="stat-label">Code Examples</div></div>
        <div><div class="stat-number">∞</div><div class="stat-label">Free</div></div>
      </div>
    </div>
    <div style="display: none;" class="section">
      <h2 class="section-title">All Languages</h2>
      <div class="grid" id="categoryGrid"></div>
    </div>
    <div class="section">
      <h2 class="section-title"><i class="fas fa-code"></i> All Languages</h2>
      <div class="grid" id="allLanguagesGrid"></div>
    </div>
  </div>
  <div class="view" id="topicView">
    <div class="topic-layout">
      <div class="topic-sidebar" id="topicSidebar"></div>
      <div class="topic-content">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="article-header">
          <div class="article-label" id="articleLabel"><i class="far fa-file-alt"></i> Tutorial</div>
          <h1 class="article-title" id="articleTitle">Loading...</h1>
          <div class="article-meta" id="articleMeta"></div>
          <div class="divider"></div>
        </div>
        <div class="article-body" id="articleBody"></div>
        <div class="footer-nav" id="footerNav"></div>
      </div>
    </div>
  </div>
</main>
<script>
let contentDB = {};
let currentLangId = null;
let currentSectionIndex = 0;
let searchItems = [];
let searchTimeout;
let selectedIndex = -1;

function getLanguageIcon(langName) {
  const name = langName.toLowerCase();
  if (name.includes('python')) return '<i class="fab fa-python"></i>';
  if (name.includes('javascript')) return '<i class="fab fa-js"></i>';
  if (name.includes('java')) return '<i class="fab fa-java"></i>';
  if (name === 'c') return '<i class="fas fa-code"></i>';
  if (name === 'c++') return '<i class="fas fa-code-branch"></i>';
  if (name === 'c#') return '<i class="fas fa-code"></i>';
  if (name.includes('html')) return '<i class="fab fa-html5"></i>';
  if (name.includes('css')) return '<i class="fab fa-css3-alt"></i>';
  if (name.includes('sql')) return '<i class="fas fa-database"></i>';
  if (name.includes('rust')) return '<i class="fab fa-rust"></i>';
  if (name.includes('go')) return '<i class="fab fa-golang"></i>';
  if (name.includes('git')) return '<i class="fab fa-git-alt"></i>';
  return '<i class="fas fa-code"></i>';
}

async function loadData() {
  try {
    const res = await fetch('db.json');
    contentDB = await res.json();

    for (const [id, lang] of Object.entries(contentDB)) {
      lang.id = id;
    }

    document.getElementById('langCount').innerText = Object.keys(contentDB).length;

    renderHomePage();
    buildSidebar();
    buildSearchIndex();

    document.getElementById('startPython').onclick = () => openTopic('python');
    document.getElementById('exploreDsa').onclick = () => openTopic('dsa');

  } catch (err) {
    console.error(err);
  }
}

function renderHomePage() {
  const allLangs = Object.values(contentDB);

  document.getElementById('allLanguagesGrid').innerHTML = allLangs.map(l => `
    <div class="card" onclick="openTopic('${l.id}')">
      <div class="card-icon">${getLanguageIcon(l.name)}</div>
      <div class="card-title">${l.name}</div>
      <div class="card-desc">${l.level || 'Beginner'} · ${l.readTime || '10 min'}</div>
    </div>
  `).join('');
}

function buildSidebar() {
  const container = document.getElementById('sidebarLanguages');
  container.innerHTML = '';

  for (const [id, lang] of Object.entries(contentDB)) {
    const div = document.createElement('div');
    div.className = 'sidebar-item';
    div.innerHTML = `${getLanguageIcon(lang.name)}<span>${lang.name}</span>`;
    div.onclick = () => openTopic(id);
    container.appendChild(div);
  }
}

function buildSearchIndex() {
  searchItems = [];

  for (const [id, lang] of Object.entries(contentDB)) {
    searchItems.push({
      label: lang.name,
      type: 'language',
      icon: getLanguageIcon(lang.name),
      action: () => openTopic(id)
    });

    if (lang.sections) {
      lang.sections.forEach((section, idx) => {
        searchItems.push({
          label: `${lang.name}: ${section}`,
          type: 'section',
          icon: getLanguageIcon(lang.name),
          action: () => {
            openTopic(id);
            setTimeout(() => loadSection(id, idx), 100);
          }
        });
      });
    }
  }
}

/* 🔥 SEARCH FIX START */

function handleSearch(query) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => runSearch(query), 150);
}

function runSearch(query) {
  const resultsDiv = document.getElementById('searchResults');
  const input = document.getElementById('searchInput');

  if (!query.trim()) {
    resultsDiv.classList.remove('show');
    return;
  }

  const q = query.toLowerCase();

  const hits = searchItems
    .map(item => ({
      ...item,
      score: item.label.toLowerCase().startsWith(q) ? 2 :
             item.label.toLowerCase().includes(q) ? 1 : 0
    }))
    .filter(i => i.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8);

  if (!hits.length) {
    resultsDiv.classList.remove('show');
    return;
  }

  selectedIndex = -1;

  resultsDiv.innerHTML = hits.map(hit => `
    <div class="search-item">
      ${hit.icon}
      <span>${hit.label}</span>
      <span class="search-item-tag">${hit.type}</span>
    </div>
  `).join('');

  const items = resultsDiv.querySelectorAll('.search-item');

  items.forEach((el, i) => {
    el.onclick = () => {
      hits[i].action();
      input.value = '';
      hideSearchResults();
    };
  });

  resultsDiv.classList.add('show');
}

/* 🔥 KEYBOARD NAVIGATION */

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  const items = document.querySelectorAll('.search-item');

  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    selectedIndex = (selectedIndex + 1) % items.length;
    updateSelection(items);
  }

  if (e.key === 'ArrowUp') {
    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
    updateSelection(items);
  }

  if (e.key === 'Enter') {
    items[selectedIndex]?.click();
  }
});

function updateSelection(items) {
  items.forEach(i => i.style.background = '');
  if (items[selectedIndex]) {
    items[selectedIndex].style.background = '#EFEFEF';
  }
}

/* 🔥 SEARCH FIX END */

function hideSearchResults() {
  document.getElementById('searchResults').classList.remove('show');
}

function goHome() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('homeView').classList.add('active');
}

function openTopic(langId) {
  currentLangId = langId;
  currentSectionIndex = 0;
  loadSection(langId, 0);

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('topicView').classList.add('active');
}

function loadSection(langId, idx) {
  const lang = contentDB[langId];
  currentSectionIndex = idx;

  const sectionName = lang.sections[idx];

  document.getElementById('articleTitle').innerText = sectionName;

  const secData = lang.content && lang.content[sectionName];

  let html = '';

  if (secData?.html) html += secData.html;

  if (secData?.code) {
    html += `
      <div class="code-block">
        <div class="code-header">
          ${secData.code.language || 'code'}
          <button onclick="copyCode(this)">Copy</button>
        </div>
        <pre>${escapeHtml(secData.code.code)}</pre>
      </div>
    `;
  }

  document.getElementById('articleBody').innerHTML = html;
}

function escapeHtml(str) {
  return str?.replace(/[&<>]/g, m =>
    m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
  ) || '';
}

window.copyCode = (btn) => {
  const code = btn.closest('.code-block').querySelector('pre').innerText;
  navigator.clipboard.writeText(code);
  btn.innerText = 'Copied!';
  setTimeout(() => btn.innerText = 'Copy', 1000);
};

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container')) {
    hideSearchResults();
  }
});

loadData();
</script>
